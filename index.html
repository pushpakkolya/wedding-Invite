<!DOCTYPE html>
<html class="no-js">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Pushpak ❤️ Drishya - 05.07.2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href='https://fonts.googleapis.com/css?family=Work+Sans:400,300,600,400italic,700' rel='stylesheet'>
<link href="https://fonts.googleapis.com/css?family=Sacramento" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Engagement">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia+Sans+Condensed">

<link rel="stylesheet" href="css/bootstrap.css">
<link rel="stylesheet" href="css/style.css">
<link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.css'>

<script src="js/modernizr-2.6.2.min.js"></script>

<style>
/* ===== HERO CLEAN LAYOUT ===== */
.hero-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.hero-title {
  margin-top: 20px;
  z-index: 2;
}

.hero-date,
.hero-quote {
  z-index: 2;
}

/* CLOCK */
.flipTimebox {
  width: 100%;
  display: flex;
  justify-content: center;
  margin: 20px 0;
}

.clock-wrapper {
  transform: scale(0.75);
  transform-origin: center;
}

/* IMAGE */
.couple-img {
  width: 160px;
  margin-top: 10px;
  position: relative;
  z-index: 1;
}

/* BUTTON */
.hero-btn {
  margin-top: 10px;
}

/* MOBILE */
@media (max-width: 768px) {
  .clock-wrapper {
    transform: scale(0.6);
  }

  .couple-img {
    width: 130px;
  }

  .hero-title {
    font-size: 26px;
  }
}
</style>

</head>

<body>

<div class="fh5co-loader"></div>

<div id="page">

<header id="fh5co-header" class="fh5co-cover" style="background-image:url(images/bg.jpg);">
  <div class="overlay"></div>

  <div class="container">
    <div class="row">
      <div class="col-md-8 col-md-offset-2 text-center">

        <div class="display-t">
          <div class="display-tc hero-content">

            <h1 class="hero-title">Pushpak &amp; Drishya</h1>

            <h2 class="hero-date">05.07.2026</h2>

            <p class="hero-quote">
              "I have found the one whom my soul loves."
            </p>

            <!-- CLOCK -->
            <div class="flipTimebox">
              <div class="clock-wrapper">
                <div class="clock"></div>
              </div>
            </div>

            <!-- IMAGE BELOW CLOCK -->
            <img src="images/couple-img.png" class="couple-img" alt="couple">

            <a href="#fh5co-event" class="btn btn-default btn-sm hero-btn">
              Save our date
            </a>

          </div>
        </div>

      </div>
    </div>
  </div>
</header>

<!-- EVENTS -->
<div id="fh5co-event" class="fh5co-bg">
  <div class="overlay"></div>
  <div class="container">
    <div class="text-center">
      <h2>Events</h2>
    </div>
  </div>
</div>

</div>

<!-- JS -->
<script src="js/jquery.min.js"></script>

<script>
  // prevent plugin crashes
  $.fn.owlCarousel = function() { return this; };
  $.fn.stellar = function() { return this; };
  $.fn.magnificPopup = function() { return this; };
</script>

<!-- ✅ FIXED: Correct Moment + Timezone order -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.js"></script>

<script src="js/clock.js"></script>
<script src="js/main.js"></script>

</body>
</html>
