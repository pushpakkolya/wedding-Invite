<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HERO ================= -->
<section class="hero">

  <div class="overlay"></div>

  <div class="hero-content">

    <h1 class="names">Pushpak & Drishya</h1>

    <div class="couple-frame">
      <img src="images/couple.png" alt="couple">
    </div>

    <p class="date">05.07.2026</p>

    <p class="verse">
      “I have found the one whom my soul loves.”<br>
      Song of Solomon 3:4
    </p>

    <!-- COUNTDOWN -->
    <div class="countdown">

      <div class="box">
        <div id="days" class="value">00</div>
        <span>Days</span>
      </div>

      <div class="box">
        <div id="hours" class="value">00</div>
        <span>Hours</span>
      </div>

      <div class="box">
        <div id="minutes" class="value">00</div>
        <span>Minutes</span>
      </div>

      <div class="box">
        <div id="seconds" class="value">00</div>
        <span>Seconds</span>
      </div>

    </div>

  </div>
</section>

<!-- ================= CTA ================= -->
<section class="cta">
  <button>Save Our Date</button>
</section>

<!-- ================= EVENTS ================= -->
<section class="events">

  <h2>Events</h2>

  <div class="event-card">

    <h3>Wedding</h3>

    <div class="event-meta">
      <span>📅 05 July 2026</span>
      <span>⏰ 11:00 AM</span>
    </div>

    <p>
      At Dream Palace Auditorium Thrichambaram, Taliparamba,
      Kannur
    </p>

    <iframe
      src="https://maps.google.com/maps?q=Taliparamba&t=&z=13&ie=UTF8&iwloc=&output=embed">
    </iframe>

  </div>

</section>

<script src="script.js"></script>

</body>
</html>
